


# Paths are relative to the recommender/ root (where this file lives).
# Set them to absolute paths if needed.
data_dirs:
  source_dir: "pipeline/artifacts/dataset/source/small"                              # place MovieLens CSVs here
  processed_dir: "pipeline/artifacts/dataset/processed"     # cleaned movies + ratings
  splits_dir: "pipeline/artifacts/dataset/splits"           # train / val / test splits
  model_assets_dir: "pipeline/artifacts/model_assets"       # embeddings, matrices, mappings

pipeline:
  min_user_ratings: 10
  min_movie_ratings: 20
  train_ratio: 0.8
  val_ratio: 0.1

models:
  als:
    factors: 32
    regularization: 0.1
    iterations: 17
    alpha: 15          # confidence scaling: C(u,i) = 1 + alpha * |pref|
  bpr:
    factors: 32
    iterations: 15
    num_threads: 4
  item_cf:
    similarity: "cosine"
    top_k_neighbors: 100
    min_similarity: 0.2
    use_positive_only: true
    normalize_scores: false
    min_co_raters: 1
    similarity_shrinkage: 0.0
    neighbor_weight_power: 1.0
    relevance_preference_threshold: 0.0
