services:
  backend:
    image: javidsegura/movie_recommender:${BACKEND_IMAGE_TAG}
    ports:
      - "8000:8000"
    env_file:
      - ${BACKEND_ENV_FILE}
    environment:
      ENVIRONMENT: staging
      CLOUD_PROVIDER: ${CLOUD_PROVIDER:-aws}
    depends_on:
      db-migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/dependencies"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  db-migration:
    image: javidsegura/movie_recommender:${BACKEND_IMAGE_TAG}
    env_file:
      - ${BACKEND_ENV_FILE}
    environment:
      ENVIRONMENT: staging

  nginx:
    volumes:
      - ./reverse-proxy-config/nginx.remote.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/app/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend

  # Expose extra ports in staging for observability
  prometheus:
    ports:
      - "9090:9090"

  grafana:
    ports:
      - "3000:3000"

  mlflow:
    ports:
      - "5000:5000"
