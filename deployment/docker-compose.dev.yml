services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: movie_recommender_frontend:dev
    ports:
      - "5173:5173"
    volumes:
      - ../frontend/app:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  database:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: db-dev-user
      POSTGRES_PASSWORD: db-dev-password
      POSTGRES_DB: dev-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db-dev-user -d dev-db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  db-migration:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: movie_recommender_db-migration:dev
    depends_on:
      database:
        condition: service_healthy

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: movie_recommender_backend:dev
    ports:
      - "8000:8000"
    volumes:
      - ../backend/src:/app/src
    command: ["sh", "-c", "uvicorn src.movie_recommender.main:app --reload --reload-dir src --reload-exclude '**/artifacts/**' --reload-exclude '**/__pycache__/**' --host 0.0.0.0 --port 8000"]
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started

      db-migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/dependencies"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s
    env_file:
      - ${BACKEND_ENV_FILE}

volumes:
  postgres-data:
