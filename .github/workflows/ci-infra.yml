name: CI - Infrastructure

on:
  push:
    branches: ['**']
    paths:
      - 'infra/**'
      - '.github/workflows/ci-infra.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'infra/**'

jobs:
  terraform:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, azure]
    defaults:
      run:
        working-directory: infra/terraform/${{ matrix.cloud }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.5'
      - name: terraform fmt
        run: terraform fmt -check -recursive
      - name: terraform init (no backend)
        run: |
          for dir in environment modules set-up; do
            if [ -d "$dir" ]; then
              for sub in "$dir"/*/; do
                [ -d "$sub" ] || continue
                if ls "$sub"*.tf >/dev/null 2>&1; then
                  echo "::group::init $sub"
                  terraform -chdir="$sub" init -backend=false -input=false
                  echo "::endgroup::"
                fi
              done
            fi
          done
      - name: terraform validate
        run: |
          for dir in environment modules set-up; do
            if [ -d "$dir" ]; then
              for sub in "$dir"/*/; do
                [ -d "$sub" ] || continue
                if ls "$sub"*.tf >/dev/null 2>&1; then
                  echo "::group::validate $sub"
                  terraform -chdir="$sub" validate
                  echo "::endgroup::"
                fi
              done
            fi
          done

  ansible:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/ansible
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ansible-lint
        run: pip install ansible ansible-lint
      - name: ansible-lint (basic profile)
        run: ansible-lint --profile min playbook/
