name: Coverage Report

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/coverage-report.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'backend/**'
      - '.github/workflows/coverage-report.yml'

env:
  PYTHON_VERSION: '3.11'
  WORKING_DIR: ./backend

jobs:
  backend-coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "backend/pyproject.toml"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: make install

      - name: Install pytest-cov (CI-only)
        run: uv pip install pytest-cov

      - name: Run backend tests with coverage
        run: .venv/bin/python -m pytest tests/unit/ --cov=src/movie_recommender --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
